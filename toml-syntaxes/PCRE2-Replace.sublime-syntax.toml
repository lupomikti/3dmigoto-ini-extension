#:tombi toml-version = "v1.1.0"
#:tombi schema.strict = false

name = "Regular Expression Replacement"
scope = "source.regexp-replace.pcre2"
version = 2

# Reference: https://www.pcre.org/current/doc/html/pcre2syntax.html#TOC1

[contexts]
main = [
  {include = "base"},
]
base = [
  {include = "escapes"},
  {include = "variables"},
  {include = "conditionals"},
]
nested-base = [
  {include = "nested-escapes"},
  {include = "variables"},
  {include = "conditionals"},
]

[[contexts.escapes]]
include = "literalizer"

[[contexts.escapes]]
include = "case-forcing"

[[contexts.escapes]]
match = '\\[lu]'
scope = "keyword.operator.case-conversion.regexp-replace"

[[contexts.escapes]]
match = '\\[fnrtbv]'
scope = "constant.character.escape.regexp-replace"

[[contexts.escapes]]
match = '\\x([a-f0-9]{2}|\{[a-f0-9]{4}\})'
scope = "constant.character.escape.regexp-replace"

[[contexts.escapes]]
match = '\\.'
scope = "constant.character.escape.regexp=replace"

[[contexts.nested-escapes]]
include = "literalizer"

[[contexts.nested-escapes]]
include = "case-forcing"

[[contexts.nested-escapes]]
match = '\\[lu]'
scope = "keyword.operator.case-conversion.regexp-replace"

[[contexts.nested-escapes]]
match = '\\[:}fnrtbv]'
scope = "constant.character.escape.regexp-replace"

[[contexts.nested-escapes]]
match = '\\x([a-f0-9]{2}|\{[a-f0-9]{4}\})'
scope = "constant.character.escape.regexp-replace"

[[contexts.nested-escapes]]
match = '\\.'
scope = "constant.character.escape.regexp=replace"

# control verb name insertion, i.e. $*MARK or ${*MARK} is not supported at this time
[[contexts.variables]]
match = '\$\$'
scope = "constant.character.escape.regexp-replace"

[[contexts.variables]]
match = '''\$[&`'_+]'''
scope = "variable.language.capture-content.regexp-replace"

[[contexts.variables]]
match = '\\g(?:\d+|<(\d+|\s*[a-zA-Z_]\w*\s*)>)'
scope = "variable.other.constant.capture-content.regexp-replace"

[[contexts.variables]]
match = '\$(?x)( \d+ | { ( \d+ | \s* [a-zA-Z_]\w* \s* ) } | < \s* [a-zA-Z_]\w* \s* > )'
scope = "variable.other.constant.capture-content.regexp-replace"

[[contexts.literalizer]]
match = '\\Q'
scope = "keyword.control.literal.regexp-replace"
push = [
  {meta_scope = "meta.string-literal.regexp-replace"},
  {meta_content_scope = "string.quoted.other.regexp-replace"},
  {
    match = '\\E',
    scope = "keyword.control.literal.regexp-replace",
    pop = true,
  }
]

[[contexts.case-forcing]]
match = '(\\L|\\U)'
scope = "keyword.operator.case-conversion.regexp-replace"
push = [
  {meta_scope = "meta.case-conversion.regexp-replace"},
  {
    match = '\\E',
    scope = "keyword.operator.case-conversion.regexp-replace",
    pop = true,
  }
]

[[contexts.conditionals]]
match = '(\${)\s*([a-zA-Z_]\w*)\s*(:-)'
captures.1 = "punctuation.definition.conditional-substitution.begin.regexp-replace"
captures.2 = "entity.name.function.capture-group.regexp-replace"
captures.3 = "keyword.operator.if-unset.regexp-replace"
push = [
  {meta_scope = "meta.conditional.unset.regexp-replace"},
  {include = "nested-base"},
  {
    match = '}',
    scope = "punctuation.definition.conditional-substitution.end.regexp-replace",
    pop = true,
  },
]

[[contexts.conditionals]]
match = '(\${)\s*([a-zA-Z_]\w*)\s*(:\+)'
captures.1 = "punctuation.definition.conditional-substitution.begin.regexp-replace"
captures.2 = "entity.name.function.capture-group.regexp-replace"
captures.3 = "keyword.operator.if-set.regexp-replace"
push = [
  {meta_scope = "meta.conditional.set.regexp-replace"},
  {include = "nested-base"},
  {
    match = ':',
    scope = "keyword.operator.else.regexp-replace",
  },
  {
    match = '}',
    scope = "punctuation.definition.conditional-substitution.end.regexp-replace",
    pop = true,
  },
]
