#:tombi toml-version = "v1.1.0"

"$schema" = "https://www.schemastore.org/tmlanguage.json"
version = "2.0.0"
scopeName = "source.migoto"
name = "migoto"
fileTypes = ["ini", "3dm", "migoto"]
patterns = [
  {include = "#preamble"},
  {include = "#comment"},
  {include = "#section"},
]

[repository.preamble]
name = "meta.head.preamble.migoto"
begin = '(?i)^(?=(namespace|condition))'
end = '$|\n'

[[repository.preamble.patterns]]
name = "meta.head.namespace.migoto"
begin = '(?i)^[ \t]*(namespace)\b\s*(=)\s*'
end = '$|\n'
beginCaptures.1.name = "meta.fixed-value.key keyword.other.migoto"
beginCaptures.2.name = "punctuation.separator.key-value.migoto"
patterns = [
  {
    name = "entity.name.namespace.migoto",
    match = '(?i)\b[^\s>\\|\/<?:*="$][^>\\|\/<?:*=$\r\n]+(?:[\\\/][^>\\|\/<?:*=$\r\n]+)*'
  }
]

[[repository.preamble.patterns]]
name = "meta.head.include-condition.migoto"
begin = '(?i)^[ \t]*(condition)\b\s*(=)\s*\b'
end = '$|\n'
beginCaptures.1.name = "meta.fixed-value.key keyword.other.migoto"
beginCaptures.2.name = "keyword.operator.assignment.migoto"
patterns = [
  {include = "#illegal-operator"},
  {include = "#operator"},
  {include = "#static-value"},
  {include = "#round-braces"},
]

[repository.comment]
begin = '(?i)(?=^.*?;)'
end = '$|\n'

[[repository.comment.patterns]]
name = "comment.line.documentation.migoto"
match = '(?i)^([ \t]+)?(;;!)(.*)$'
captures.1.name = "punctuation.whitespace.comment.leading.migoto"
captures.2.name = "punctuation.definition.comment.migoto"
captures.3.name = "comment.line.documentation.content.migoto"

[[repository.comment.patterns]]
name = "comment.line.semicolon.migoto"
match = '(?i)^([ \t]+)?(;)((?<!;!).*)$'
captures.1.name = "punctuation.whitespace.comment.leading.migoto"
captures.2.name = "punctuation.definition.comment.migoto"
captures.3.name = "comment.line.semicolon.content.migoto"

[[repository.comment.patterns]]
name = "invalid.illegal"
match = '(?i)^(.+)(;)([\S ]+)$'
captures.2.name = "punctuation.definition.comment.migoto"
captures.3.name = "comment.line.semicolon.content.migoto"

[repository.section]
patterns = [
  {include = "#special-section"},
  {include = "#setting-section"},
  {include = "#commandlist-section"},
]

[repository.special-section]
patterns = [
  {include = "#constants-section"},
  {include = "#present-section"},
  {include = "#hunting-section"},
  {include = "#key-section"},
  {include = "#preset-section"},
  {include = "#shader-regex-section"},
]

# Constants Section
[repository.constants-section]
name = "meta.section.constants.migoto"
begin = '(?i)(?:^[ \t]*(\[)\s*(Constants)\s*(\])[ \t]*$)'
end = '(?i)(?=^[ \t]*\[.+\][ \t]*$|\z)'  # \z is there to match the end of the file
beginCaptures.1.name = "punctuation.definition.entity.begin.migoto"
beginCaptures.2.name = "entity.name.section.group-title.migoto"
beginCaptures.3.name = "punctuation.definition.entity.end.migoto"
patterns = [
  {include = "#comment"},
  {include = "#global-declaration"},
  {include = "#primary-statement"},
]

# Present Section
[repository.present-section]
name = "meta.section.present.migoto"
begin = '(?i)(?:^[ \t]*(\[)\s*(Present)\s*(\])[ \t]*$)'
end = '(?i)(?=^[ \t]*\[.+\][ \t]*$|\z)'  # \z is there to match the end of the file
beginCaptures.1.name = "punctuation.definition.entity.begin.migoto"
beginCaptures.2.name = "entity.name.section.group-title.migoto"
beginCaptures.3.name = "punctuation.definition.entity.end.migoto"
patterns = [
  {include = "#comment"},
  {include = "#primary-statement"},
]

# Hunting Section
[repository.hunting-section]
name = "meta.section.hunting.migoto"
begin = '(?i)(?:^[ \t]*(\[)\s*(Hunting)\s*(\])[ \t]*$)'
end = '(?i)(?=^[ \t]*\[.+\][ \t]*$|\z)'  # \z is there to match the end of the file
beginCaptures.1.name = "punctuation.definition.entity.begin.migoto"
beginCaptures.2.name = "entity.name.section.group-title.migoto"
beginCaptures.3.name = "punctuation.definition.entity.end.migoto"
patterns = [
  {include = "#setting-statement"},
  {include = "#comment"},  # moved to second spot to allow `;` as key-binding character
]

# Key Section
[repository.key-section]
name = "meta.section.key.migoto"
begin = '(?i)(?:^[ \t]*(\[)\s*(Key.+)\s*(\])[ \t]*$)'
end = '(?i)(?=^[ \t]*\[.+\][ \t]*$|\z)'  # \z is there to match the end of the file
beginCaptures.1.name = "punctuation.definition.entity.begin.migoto"
beginCaptures.2.name = "entity.name.section.group-title.migoto"
beginCaptures.3.name = "punctuation.definition.entity.end.migoto"

# Key Setting Statement
[[repository.key-section.patterns]]
name = "meta.statement.setting.migoto"
match = '''(?xi)
^[ \t]*
(?!\b(?:
  run|condition|key|back|
  vb\d|ib|(?:[rf]_)?bb|s?o\d|od|
  (?<!$)[xyzw]\d{0,3}|
  this|(?:ini|stereo)params|cursor_(?:mask|color)
)\b)                 # keywords and variables that are not keys, defined in-lieu of lexical precedence
([a-z0-9]\w+)        # fixed_value
\s*(=)\s*([^\r\n]+)  # = fixed_value | boolean_value | static_value ; can be a list of each, or mixed. LSP will handle correctness
'''
captures.1.name = "meta.keyword.key keyword.other.migoto"
captures.2.name = "punctuation.separator.key-value.migoto"
captures.3.patterns = [
  {include = "#fixed-value"},
  {include = "#boolean-value"},
  {include = "#static-value"},
]

## Key Setting Statement - Keybinding Value Key
[[repository.key-section.patterns]]
name = "meta.statement.setting.migoto"
match = '(?i)^[ \t]*(key|back)\s*(=)\s*([^\r\n]+)'
captures.1.name = "meta.keyword.key keyword.other.migoto"
captures.2.name = "punctuation.separator.key-value.migoto"
captures.3.patterns = [{include = "#keybinding-modifier"}]

# Key Run Instruction | run = list of callable_commandlist
[[repository.key-section.patterns]]
name = "meta.statement.instruction.migoto"
match = '(?i)^[ \t]*(run)\s*(=)\s*([^\r\n]+)(?:$|\n)'
captures.1.name = "meta.function-call.instruction support.function.builtin.migoto"
captures.2.name = "keyword.operator.execution.migoto"
captures.3.patterns = [{include = "#callable-commandlist"}]

# Key Condition Statement | condition = list of operational_expression
[[repository.key-section.patterns]]
name = "meta.statement.condition.migoto"
match = '(?i)^[ \t]*(condition)\s*(=)\s*([^\r\n]+)(?:$|\n)'
captures.1.name = "meta.keyword.key keyword.other.condition.migoto"
captures.2.name = "keyword.operator.assignment.migoto"
captures.3.patterns = [{include = "#operational-expression"}]

# Key Assignment Statement | assignments, but listable values
[[repository.key-section.patterns]]
name = "meta.statement.assignment.migoto"
match = '''(?xi)
^[ \t]* # optional leading whitespace
(\b[xyzw]\d{0,3}\b) # an ini parameter
\s*
(=) # assignment operator, surrounded by optional whitespace
\s*
([^\r\n]+) # RHS value, here must be a static value
(?:$|\n)'''
captures.1.patterns = [{include = "#ini-parameter"}]
captures.2.name = "keyword.operator.assignment.migoto"
captures.3.patterns = [{include = "#static-value"}]

[[repository.key-section.patterns]]
name = "meta.statement.assignment.migoto"
match = '''(?xi)
^[ \t]* # optional leading whitespace
(\$(?:\\.+\\)?\w+\b) # a $ variable
\s*
(=) # assignment operator, surrounded by optional whitespace
\s*
([^\r\n]+) # RHS value, here must be a static value
(?:$|\n)'''
captures.1.patterns = [{include = "#named-variable"}]
captures.2.name = "keyword.operator.assignment.migoto"
captures.3.patterns = [{include = "#static-value"}]

[[repository.key-section.patterns]]
include = "#comment"

# Preset Section
[repository.preset-section]
name = "meta.section.preset.migoto"
begin = '(?i)(?:^[ \t]*(\[)\s*(Preset.+)\s*(\])[ \t]*$)'
end = '(?i)(?=^[ \t]*\[.+\][ \t]*$|\z)'  # \z is there to match the end of the file
beginCaptures.1.name = "punctuation.definition.entity.begin.migoto"
beginCaptures.2.name = "entity.name.section.group-title.migoto"
beginCaptures.3.name = "punctuation.definition.entity.end.migoto"

# Preset Setting Statement
[[repository.preset-section.patterns]]
name = "meta.statement.setting.migoto"
match = '''(?xi)
^[ \t]*
(?!\b(?:
  run|condition|
  vb\d|ib|(?:[rf]_)?bb|s?o\d|od|
  (?<!$)[xyzw]\d{0,3}|
  this|(?:ini|stereo)params|cursor_(?:mask|color)
)\b)                 # keywords and variables that are not keys, defined in-lieu of lexical precedence
([a-z0-9]\w+)        # fixed_value
\s*(=)\s*([^,\r\n]+)  # = fixed_value | boolean_value | static_value
'''
captures.1.name = "meta.keyword.key keyword.other.migoto"
captures.2.name = "punctuation.separator.key-value.migoto"
captures.3.patterns = [
  {include = "#fixed-value"},
  {include = "#boolean-value"},
  {include = "#static-value"},
]

# Preset Run Instruction
[[repository.preset-section.patterns]]
name = "meta.statement.instruction.migoto"
match = '(?i)^[ \t]*(run)\s*(=)\s*([^,\r\n]+)(?:$|\n)'
captures.1.name = "meta.function-call.instruction support.function.builtin.migoto"
captures.2.name = "keyword.operator.execution.migoto"
captures.3.patterns = [{include = "#callable-commandlist"}]

# Preset Condition Statement
[[repository.preset-section.patterns]]
name = "meta.statement.condition.migoto"
match = '(?i)^[ \t]*(condition)\s*(=)\s*([^,\r\n]+)(?:$|\n)'
captures.1.name = "meta.keyword.key keyword.other.condition.migoto"
captures.2.name = "keyword.operator.assignment.migoto"
captures.3.patterns = [{include = "#operational-expression"}]

# Preset Assignment Statement
[[repository.preset-section.patterns]]
name = "meta.statement.assignment.migoto"
match = '''(?xi)
^[ \t]* # optional leading whitespace
(\b[xyzw]\d{0,3}\b) # an ini parameter
\s*
(=) # assignment operator, surrounded by optional whitespace
\s*
([^,\r\n]+) # RHS value, here must be a static value
(?:$|\n)'''
captures.1.patterns = [{include = "#ini-parameter"}]
captures.2.name = "keyword.operator.assignment.migoto"
captures.3.patterns = [{include = "#static-value"}]

[[repository.preset-section.patterns]]
name = "meta.statement.assignment.migoto"
match = '''(?xi)
^[ \t]* # optional leading whitespace
(\$(?:\\.+\\)?\w+\b) # a $ variable
\s*
(=) # assignment operator, surrounded by optional whitespace
\s*
([^,\r\n]+) # RHS value, here must be a static value
(?:$|\n)'''
captures.1.patterns = [{include = "#named-variable"}]
captures.2.name = "keyword.operator.assignment.migoto"
captures.3.patterns = [{include = "#static-value"}]

[[repository.preset-section.patterns]]
include = "#comment"

# Shader Regex Sections

# Shader Regex (Pattern Matching)
[[repository.shader-regex-section.patterns]]
name = "meta.section.shader-regex.pattern.migoto"
begin = '(?i)(?:^[ \t]*(\[)\s*(ShaderRegex.+\.Pattern)\s*(\])[ \t]*$)'
end = '(?i)(?=^[ \t]*\[.+\][ \t]*$|\z)'  # \z is there to match the end of the file
beginCaptures.1.name = "punctuation.definition.entity.begin.migoto"
beginCaptures.2.name = "entity.name.section.group-title.migoto"
beginCaptures.3.name = "punctuation.definition.entity.end.migoto"
contentName = "meta.embedded.block.regexp"
patterns = [
  {include = "#comment"},
  {include = "source.regexp.pcre2"},
]

# Shader Regex (Replacement)
[[repository.shader-regex-section.patterns]]
name = "meta.section.shader-regex.replace.migoto"
begin = '(?i)(?:^[ \t]*(\[)\s*(ShaderRegex.+\.Pattern\.Replace)\s*(\])[ \t]*$)'
end = '(?i)(?=^[ \t]*\[.+\][ \t]*$|\z)'  # \z is there to match the end of the file
beginCaptures.1.name = "punctuation.definition.entity.begin.migoto"
beginCaptures.2.name = "entity.name.section.group-title.migoto"
beginCaptures.3.name = "punctuation.definition.entity.end.migoto"
patterns = [
  {include = "#comment"},
  {include = "source.regexp-replace.pcre2"},
]

# Shader Regex (Insert Declarations)
[[repository.shader-regex-section.patterns]]
name = "meta.section.shader-regex.declarations.migoto"
begin = '(?i)(?:^[ \t]*(\[)\s*(ShaderRegex.+\.InsertDeclarations)\s*(\])[ \t]*$)'
end = '(?i)(?=^[ \t]*\[.+\][ \t]*$|\z)'  # \z is there to match the end of the file
beginCaptures.1.name = "punctuation.definition.entity.begin.migoto"
beginCaptures.2.name = "entity.name.section.group-title.migoto"
beginCaptures.3.name = "punctuation.definition.entity.end.migoto"
patterns = [{include = "#comment"}]  # everything not a comment is free_text unil source.dxbc is made

# Shader Regex (CommandList)
[[repository.shader-regex-section.patterns]]
name = "meta.section.shader-regex.migoto"
begin = '''(?xi)
(?<!^[ \t]*\[\s*ShaderRegex.+(?:\.Pattern.*|\.InsertDeclarations)\s*\][ \t]*$) # Ensure this is not one of the other 3
(?:^[ \t]*(\[)\s*(ShaderRegex.+)\s*(\])[ \t]*$)'''
end = '(?i)(?=^[ \t]*\[.+\][ \t]*$|\z)'  # \z is there to match the end of the file
beginCaptures.1.name = "punctuation.definition.entity.begin.migoto"
beginCaptures.2.name = "entity.name.section.group-title.migoto"
beginCaptures.3.name = "punctuation.definition.entity.end.migoto"
patterns = [
  {include = "#comment"},
  {include = "#shader-regex-setting-statement"},
  {include = "#primary-statement"},
]

[[repository.shader-regex-setting-statement.patterns]]
name = "meta.statement.setting.migoto"
match = '(?i)^[ \t]*(filter_index)\s*(=)\s*([^\r\n]+)'
captures.1.name = "meta.keyword.key keyword.other.migoto"
captures.2.name = "punctuation.separator.key-value.migoto"
captures.3.patterns = [{include = "#constant"}]

[[repository.shader-regex-setting-statement.patterns]]
name = "meta.statement.setting.migoto"
match = '(?i)^[ \t]*(shader_model|temps)\s*(=)\s*[^\r\n]+'
captures.1.name = "meta.keyword.key keyword.other.migoto"
captures.2.name = "punctuation.separator.key-value.migoto"

[repository.setting-section]
name = "meta.section.settings.migoto"
begin = '''(?xi)(?:
^[ \t]*
  (\[) # capture group 1, opening bracket
  [ \t]*
  (Logging|System|Device|Stereo|Rendering|Profile|ConvergenceMap|Loader|Resource.+|Include.*) # capture group 2, section header
  [ \t]*
  (\]) # capture group 3, closing bracket
[ \t]*$
)'''
end = '''(?i)(?=^[ \t]*\[.+\][ \t]*$|\z)'''  # \z is there to match the end of the file
beginCaptures.1.name = "punctuation.definition.entity.begin.migoto"
beginCaptures.2.name = "entity.name.section.group-title.migoto"
beginCaptures.3.name = "punctuation.definition.entity.end.migoto"
patterns = [
  {include = "#comment"},
  {include = "#setting-statement"},
]

[repository.commandlist-section]
name = "meta.section.commandlists.migoto"
begin = '''(?xi)(?:
^[ \t]*
  (\[) # capture group 1, opening bracket
  [ \t]*
  (
   Clear(?:RenderTarget|DepthStencil)View | ClearUnorderedAccessView(?:Uint|Float) |
   (?: TextureOverride | ShaderOverride | (?:BuiltIn)?(?:CustomShader|CommandList) ).+
  )    # capture group 2, section header
  [ \t]*
  (\]) # capture group 3, closing bracket
[ \t]*$
)'''
end = '''(?i)(?=^[ \t]*\[.+\][ \t]*$|\z)'''  # \z is there to match the end of the file
beginCaptures.1.name = "punctuation.definition.entity.begin.migoto"
beginCaptures.2.name = "entity.name.section.group-title.migoto"
beginCaptures.3.name = "punctuation.definition.entity.end.migoto"
patterns = [
  {include = "#comment"},
  {include = "#setting-statement"},
  {include = "#primary-statement"},
]

[[repository.setting-statement.patterns]]
name = "meta.statement.setting.migoto"
match = '''(?xi)
^[ \t]*
(?!\b(?:
  hash|[vhdgpc]s|
  (?:override|cache|storage)_directory|include(?:_recursive)?|exclude_recursive|
  (?:done_|toggle_)hunting | next_marking_mode | mark_snapshot|
  (?:previous|next|mark)_(?:pixel|vertex|compute|geometry|domain|hull)shader|
  (?:previous|next|mark)_(?:index|vertex)buffer | (?:previous|next)_(?:index|vertex)buffer_slot|
  (?:previous|next|mark)_rendertarget|
  take_screenshot | reload_fixes | (?:reload|wipe_user)_config | show_original|
  monitor_performance | freeze_performance_monitor | tune[123]_(?:up|down)|
  analyse_frame | toggle_full_screen | force_full_screen_on_key|
  run|checktextureoverride|(?:exclude_)?preset|handling|clear|special|dump|store|
  draw(?:indexed|instanced|indexedinstanced|instancedindirect|indexedinstancedindirect)?|dispatch(?:indirect)?|
  vb\d|ib|(?:[rf]_)?bb|s?o\d|od|
  (?<!$)[xyzw]\d{0,3}|
  this|(?:ini|stereo)params|cursor_(?:mask|color)|
  Resource.+
)\b)        # ^ exclusions to resolve conflicts or handle special cases
([\w\[\]]+) # a word-like that is not in the preceding list and includes brackets for blend[N]/blend_factor[N] keys
\s* (=) \s* # kvp separator surrounded by optional whitespace
(?: ([^"\\/\s\r\n]+) | ([^\s\r\n]+) | ([^\r\n]+) )  # match anything on the right-hand-side
(?:$|\n)'''
captures.1.patterns = [{include = "#key"}]
captures.2.name = "punctuation.separator.key-value.migoto"
captures.3.patterns = [
  {include = "#resource-type"},  # DXGI types + Resource types
  {include = "#constant"},
  {include = "#boolean-value"},
  {include = "#path-value"},
  {include = "#fixed-value"},
]
captures.4.patterns = [
  {include = "#string"},
  {include = "#path-value"},
  {include = "#fixed-value"},
]
captures.5.patterns = [
  {include = "#string"},
  {include = "#path-value"},
  {include = "#list-expression"},
  {include = "#fuzzy-match-expression"},
  {include = "#fixed-value"},
]

# Hash statement
[[repository.setting-statement.patterns]]
name = "meta.statement.setting.migoto"
match = '''(?xi)
^[ \t]*
\b(hash)\b
\s* (=) \s*
(?:[a-z0-9]+)
[ \t]*
(?:$|\n)'''
captures.1.name = "meta.keyword.hash.key keyword.other.migoto"
captures.2.name = "punctuation.separator.key-value.migoto"

# Custom Shader - Shader Name Keys
[[repository.setting-statement.patterns]]
name = "meta.statement.setting.migoto"
match = '''(?xi)
^[ \t]*
\b([vhdgpc]s)\b
\s* (=) \s*
([^\r\n]+)
[ \t]*
(?:$|\n)'''
captures.1.name = "meta.keyword.shader.key keyword.other.migoto"
captures.2.name = "punctuation.separator.key-value.migoto"
captures.3.patterns = [
  {name = "constant.language.null.migoto", match = '\b(?i)(null)\b'},
  {include = "#path-value"}
]

# KeyBinding Keys
[[repository.setting-statement.patterns]]
name = "meta.statement.setting.migoto"
match = '''(?xi)
^[ \t]*
\b(
  (?:done_|toggle_)hunting | next_marking_mode | mark_snapshot |
  (?:previous|next|mark)_(?:pixel|vertex|compute|geometry|domain|hull)shader |
  (?:previous|next|mark)_(?:index|vertex)buffer | (?:previous|next)_(?:index|vertex)buffer_slot |
  (?:previous|next|mark)_rendertarget|
  take_screenshot | reload_fixes | (?:reload|wipe_user)_config | show_original |
  monitor_performance | freeze_performance_monitor | tune[123]_(?:up|down) |
  analyse_frame | toggle_full_screen | force_full_screen_on_key
)\b         # ^^^ keys that take KeyBinding as a value
\s* (=) \s* # kvp separator surrounded by optional whitespace
([^\r\n]+)  # RHS value, open to accommodate symbols
[ \t]*
(?:$|\n)'''
captures.1.name = "meta.keyword.binding.key keyword.other.migoto"
captures.2.name = "punctuation.separator.key-value.migoto"
captures.3.patterns = [{include = "#keybinding-modifier"}]

# Directory and File Keys
[[repository.setting-statement.patterns]]
name = "meta.statement.setting.migoto"
match = '''(?xi)
^[ \t]*
\b((?:override|cache|storage)_directory|include(?:_recursive)?|exclude_recursive)\b
\s* (=) \s* # kvp separator surrounded by optional whitespace
([^\r\n]+)  # match anything on the right-hand-side
[ \t]*
(?:$|\n)'''
captures.1.name = "meta.keyword.path-value.key keyword.other.migoto"
captures.2.name = "punctuation.separator.key-value.migoto"
captures.3.patterns = [
  {include = "#path-value"},
  {match = '(.+?)[ \t]*$', captures.1.name = "constant.other.path.migoto"},
]

[repository.primary-statement]
patterns = [
  {include = "#local-declaration"},
  {include = "#general-statement"},
  {include = "#conditional-statement"},
]

[repository.conditional-statement]
name = "meta.statement.conditional.migoto"
begin = '(?i)^[ \t]*(?:(if|elif|else if)(?= )|(else[ \t]*$|endif[ \t]*$))'
beginCaptures.1.name = "keyword.control.flow.migoto"
beginCaptures.2.name = "keyword.control.flow.migoto"
end = '$|\n'
contentName = "meta.expression.operational.migoto"
patterns = [{include = "#operational-expression"}]

[repository.global-declaration]
name = "meta.statement.declaration.global.migoto"
match = '''(?xi)
^[ \t]* # optional leading whitespace
(?:(persist)\s+)? # the persist keyword, which can only pair with global, and which apparently can come before global
(global)\s+ # the global keyword which must be followed by at least one whitespace character
(?:(persist)\s+)? # the persist keyword, which can only pair with global, and which is usually in this position
(\$\w+) # a $ variable
\s*
(?:
  (=) \s* # assignment operator, surrounded by optional whitespace
  ([+\-]?[\d.]+|inf|NaN) # RHS value, only Numbers allowed
)? # Assignment operator and RHS-value are optional, e.g. `global $variable` on a line by itself
\s*
(?:$|\n)'''
captures.1.name = "storage.modifier.migoto"
captures.2.name = "storage.modifier.migoto"
captures.3.name = "storage.modifier.migoto"
captures.4.patterns = [
  {include = "#named-variable"},
]
captures.5.name = "keyword.operator.assignment.migoto"
captures.6.patterns = [
  {include = "#static-value"},
]

[repository.local-declaration]
name = "meta.statement.declaration.local.migoto"
match = '''(?xi)
^[ \t]* # optional leading whitespace
(local)\s+ # the local keyword which must be followed by at least one whitespace character
(\$\w+) # a $ variable
\s*
