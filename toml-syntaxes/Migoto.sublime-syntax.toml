#:tombi toml-version = "v1.1.0"
#:tombi schema.strict = false

name = "Migoto"
file_extensions = ["ini", "3dm", "migoto"]
scope = "source.migoto"
version = 2

[variables]
cl_section_names = '\s*(?:(?:(?:Shader|Texture)Override|(?:BuiltIn)?(?:CustomShader|CommandList)).+(?=\s*\])|Clear(?:RenderTarget|DepthStencil)View|ClearUnorderedAccessView(?:Uint|Float))'
kvp_section_names = '\s*(?:Resource.+(?=\s*\])|Include.*(?=\s*\])|Hunting|Logging|System|Device|Stereo|Rendering|Profile|ConvergenceMap|Loader)'
special_section_names = '\s*(?:Constants|Present|(?:Key|Preset|ShaderRegex).+(?=\s*\]))'
ws = '[ \t]'
namespace_path = '[^\s>\\|\/<?:*="$][^>\\|\/<?:*=$\r\n]+(?:[\\\/][^>\\|\/<?:*=$\r\n]+)*'
namespace = '[^=$\r\n]+'
custom_section_name = '[^=$,\r\n]+'
var = '[a-z_]\w+|[a-z]'
ident = '[a-z0-9]\w+'
line_end_context = '(?:\n|(?<=\n))'
path_keys = '(?:override|cache|storage)_directory|include(?:_recursive)?|exclude_recursive'
keybinding_keys = '''
  (?:done_|toggle_)hunting | next_marking_mode | mark_snapshot |
  (?:previous|next|mark)_(?:pixel|vertex|compute|geometry|domain|hull)shader |
  (?:previous|next|mark)_(?:index|vertex)buffer | (?:previous|next)_(?:index|vertex)buffer_slot |
  (?:previous|next|mark)_rendertarget|
  take_screenshot | reload_fixes | (?:reload|wipe_user)_config | show_original |
  monitor_performance | freeze_performance_monitor | tune[123]_(?:up|down) |
  analyse_frame | toggle_full_screen | force_full_screen_on_key
'''

[contexts]
main = [
  {include = "comment"},
  {include = "preamble"},
  {include = "section-base"},
]
resource-type = [
  {meta_scope = "meta.setting-value.resource"},
  {
    scope = "entity.name.type.resource.migoto",
    match = '\b(?i)((?:RW)?(?:Append|Consume)?StructuredBuffer|(?:RW)?(?:ByteAddress)?Buffer|(?:RW)?Texture[123]D|TextureCube)\b'
  },
  {include = "dxgi-format"},
]

[[contexts.fallthrough]]
match = '(?=\[(?:{{cl_section_names}}|{{kvp_section_names}}|{{special_section_names}})\])'
pop = 2

# Comment context

[[contexts.comment]]
match = '^({{ws}}+)?((;)<([^\n]*)\n)'
captures.0 = "comment.line.semicolon.migoto"
captures.1 = "punctuation.whitespace.comment.leading.migoto"
captures.2 = "punctuation.definition.comment-fold.begin.migoto"
captures.3 = "punctuation.definition.comment.migoto"
captures.4 = "comment.line.semicolon.content.migoto"

[[contexts.comment]]
match = '^({{ws}}+)?(;).*(>)(?=\n)'
captures.1 = "punctuation.whitespace.comment.leading.migoto"
captures.2 = "punctuation.definition.comment.migoto"
captures.3 = "punctuation.definition.comment-fold.end.migoto"
push = [
  {meta_scope = "comment.line.semicolon.migoto"},
  {meta_content_scope = "comment.line.semicolon.content.migoto"},
  {match = '\n', pop = true},
]

[[contexts.comment]]
match = '^({{ws}}+)?(;;!)'
captures.1 = "punctuation.whitespace.comment.leading.migoto"
captures.2 = "punctuation.definition.comment.migoto"
push = [
  {meta_scope = "comment.line.documentation.migoto"},
  {meta_content_scope = "comment.line.documentation.content.migoto"},
  {match = '\n', pop = true},
]

[[contexts.comment]]
match = '^({{ws}}+)?(;)(?!;!)'
captures.1 = "punctuation.whitespace.comment.leading.migoto"
captures.2 = "punctuation.definition.comment.migoto"
push = [
  {meta_scope = "comment.line.semicolon.migoto"},
  {meta_content_scope = "comment.line.semicolon.content.migoto"},
  {match = '\n', pop = true},
]

[[contexts.comment]]
match = '^\S+{{ws}}*(;)'
captures.1 = "invalid.illegal punctuation.definition.comment.migoto"
push = [
  {meta_scope = "invalid.illegal comment.line.semicolon.migoto"},
  {match = '\n', pop = true},
]

# Preamble context

[[contexts.preamble]]
match = '(?i)^{{ws}}*(namespace)\b{{ws}}*(=){{ws}}*'
captures.1 = "meta.fixed-value.key keyword.other.migoto"
captures.2 = "punctuation.separator.key-value.migoto"
push = [
  {meta_scope = "meta.head.namespace.migoto"},
  {match = '(?i)\b{{namespace_path}}', scope = "entity.name.namespace.migoto", pop = true},
  {match = '\n', pop = true},
]

[[contexts.preamble]]
match = '(?i)^{{ws}}*(condition)\b{{ws}}*(=){{ws}}*\b'
captures.1 = "meta.fixed-value.key keyword.other.migoto"
captures.2 = "keyword.operator.assignment.migoto"
push = [
  {meta_scope = "meta.head.include-condition.migoto"},
  {include = "illegal-operator"},
  {include = "operator"},
  {include = "static-value"},
  {include = "round-braces"},
  {match = '\n', pop = true},
]

# Sections contexts

[[contexts.section-base]]
match = '\['
scope = "punctuation.definition.entity.begin.migoto"
push = "section-title"

[[contexts.section-title]]
meta_scope = "meta.tag.section-header.migoto"

# Special Headers

[[contexts.section-title]]
match = '(?i){{ws}}*Constants'
scope = "meta.section.constants.migoto entity.name.section.group-title.migoto"
push = [
  # pop anonymous context and pop section-title, then push body
  {
    match = '\]',
    scope = "punctuation.definition.entity.end.migoto",
    pop = 2,
    set = "constants-body",
  },
  {match = '\n', pop = true},
]

[[contexts.section-title]]
match = '(?i){{ws}}*Present'
scope = "meta.section.present.migoto entity.name.section.group-title.migoto"
push = [
  # pop anonymous context and pop section-title, then push body
  {
    match = '\]',
    scope = "punctuation.definition.entity.end.migoto",
    pop = 2,
    set = "present-body",
  },
  {match = '\n', pop = true},
]

[[contexts.section-title]]
match = '(?i){{ws}}*Key.+(?=\s*\])'
scope = "meta.section.key.migoto entity.name.section.group-title.migoto"
push = [
  # pop anonymous context and pop section-title, then push body
  {
    match = '\]',
    scope = "punctuation.definition.entity.end.migoto",
    pop = 2,
    set = "key-body",
  },
  {match = '\n', pop = true},
]

[[contexts.section-title]]
match = '(?i){{ws}}*Preset.+(?=\s*\])'
scope = "meta.section.preset.migoto entity.name.section.group-title.migoto"
push = [
  # pop anonymous context and pop section-title, then push body
  {
    match = '\]',
    scope = "punctuation.definition.entity.end.migoto",
    pop = 2,
    set = "preset-body",
  },
  {match = '\n', pop = true},
]

[[contexts.section-title]]
match = '(?i){{ws}}*ShaderRegex.+\.Pattern(?=\s*\])'
scope = "meta.section.shader-regex.pattern.migoto entity.name.section.group-title.migoto"
push = [
  {meta_content_scope = "meta.tag.section-header.migoto entity.name.section.group-title.migoto"},
  {
    match = '\]',
    scope = "punctuation.definition.entity.end.migoto",
    pop = 2,
    push = [
      {meta_content_scope = "meta.embedded.block.regexp"},
      {include = "comment"},
      {
        match = '(?=\[\s*(?:{{cl_section_names}}|{{kvp_section_names}}|{{special_section_names}})\s*\])',
        pop = true
      },
      {include = "scope:source.regexp.pcre2"},
    ]
  },
  {match = '\n', pop = true},
]

[[contexts.section-title]]
match = '(?i){{ws}}*ShaderRegex.+\.Pattern\.Replace(?=\s*\])'
scope = "meta.section.shader-regex.replace.migoto entity.name.section.group-title.migoto"
push = [
  {meta_content_scope = "meta.tag.section-header.migoto entity.name.section.group-title.migoto"},
  {
    match = '\]',
    scope = "punctuation.definition.entity.end.migoto",
    pop = 2,
    push = [
      {meta_content_scope = "meta.embedded.block.regexp-replace"},
      {include = "comment"},
      {
        match = '(?=\[\s*(?:{{cl_section_names}}|{{kvp_section_names}}|{{special_section_names}})\s*\])',
        pop = true
      },
      {include = "scope:source.regexp-replace.pcre2"},
    ]
  },
  {match = '\n', pop = true},
]

[[contexts.section-title]]
match = '(?i){{ws}}*ShaderRegex.+\.InsertDeclarations(?=\s*\])'
scope = "meta.section.shader-regex.declarations.migoto entity.name.section.group-title.migoto"
push = [
  # pop anonymous context and pop section-title, then push body
  {
    match = '\]',
    scope = "punctuation.definition.entity.end.migoto",
    pop = 2,
    set = "regex-declarations-body",
  },
  {match = '\n', pop = true},
]

[[contexts.section-title]]
match = '(?i){{ws}}*ShaderRegex.+(?!\.(?:Pattern(\.Replace)?|InsertDeclarations))(?=\s*\])'
scope = "meta.section.shader-regex.migoto entity.name.section.group-title.migoto"
push = [
  # pop anonymous context and pop section-title, then push body
  {
    match = '\]',
    scope = "punctuation.definition.entity.end.migoto",
    pop = 2,
    set = "regex-commandlist-body",
  },
  {match = '\n', pop = true},
]

# Normal Headers

[[contexts.section-title]]
match = '(?i){{ws}}*{{kvp_section_names}}'
scope = "entity.name.section.group-title.migoto.kvp-section"
push = [
  # pop anonymous context and pop section-title, then push body
  {
    match = '\]',
    scope = "punctuation.definition.entity.end.migoto",
    pop = 2,
    set = "kvp-body",
  },
  {match = '\n', pop = true},
]

[[contexts.section-title]]
match = '(?i){{ws}}*{{cl_section_names}}'
scope = "entity.name.section.group-title.migoto.cl-section"
push = [
  # pop anonymous context and pop section-title, then push body
  {
    match = '\]',
    scope = "punctuation.definition.entity.end.migoto",
    pop = 2,
    set = "cl-body",
  },
  {match = '\n', pop = true},
]

# Special Bodies

# Constants Section Body

[[contexts.constants-body]]
include = "comment"

[[contexts.constants-body]]
include = "global-declaration"

[[contexts.constants-body]]
include = "primary-statement"

[[contexts.constants-body]]
include = "fallthrough"

# Present Section Body

[[contexts.present-body]]
include = "comment"

[[contexts.present-body]]
include = "primary-statement"

[[contexts.present-body]]
include = "fallthrough"

# Key Section Body

## Key Setting Statement - Keybinding Value Key
[[contexts.key-body]]
match = '(?i)\b(key|back)\b'
scope = "meta.keyword.key keyword.other.migoto"
push = [
  {meta_scope = "meta.statement.setting.migoto"},
  {
    match = '=',
    scope = "punctuation.separator.key-value.migoto",
    push = [
      {include = "keybinding-modifier"},
      {match = '\n', pop = 2},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

## Key Run Instruction | run = list of callable_commandlist
[[contexts.key-body]]
match = '(?i)\b(run)\b'
scope = "meta.function-call.instruction support.function.builtin.migoto"
push = [
  {meta_scope = "meta.statement.instruction.migoto"},
  {
    match = '=',
    scope = "keyword.operator.execution.migoto",
    push = [
      {include = "callable-commandlist"},
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

## Key Condition Statement | condition = list of operational_expression
[[contexts.key-body]]
match = '(?i)\b(condition)\b'
scope = "meta.keyword.key keyword.other.condition.migoto"
push = [
  {meta_scope = "meta.statement.condition.migoto"},
  {
    match = '=',
    scope = "keyword.operator.assignment.migoto",
    push = [
      {include = "operational-expr"},
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

## Key Assignment Statement | assignments, but listable values
[[contexts.key-body]]
match = '(?i)(?=\b[xyzw]\d{0,3}\b)'
push = [
  {meta_scope = "meta.statement.assignment.migoto"},
  {include = "ini-parameter"},
  {
    match = '=',
    scope = "keyword.operator.assignment.migoto",
    push = [
      {include = "static-value"},
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

[[contexts.key-body]]
match = '(?i)(?=\$(\\.+\\)?\w+\b)'
push = [
  {meta_scope = "meta.statement.assignment.migoto"},
  {include = "named-variable"},
  {
    match = '=',
    scope = "keyword.operator.assignment.migoto",
    push = [
      {include = "static-value"},
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

## Key Setting Statement
[[contexts.key-body]]
match = '(?i)\b({{ident}})\b'
scope = "meta.keyword.key keyword.other.migoto"
push = [
  {meta_scope = "meta.statement.setting.migoto"},
  {
    match = '=',
    scope = "punctuation.separator.key-value.migoto",
    push = [
      {include = "fixed-value"},
      {include = "boolean-value"},
      {include = "static-value"},
      {match = '\n', pop = 2},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

[[contexts.key-body]]
include = "comment"

[[contexts.key-body]]
include = "fallthrough"

# Preset Section Body

[[contexts.preset-body]]
include = "comment"

## Preset Run Instruction
[[contexts.preset-body]]
match = '(?i)\b(run)\b'
scope = "meta.function-call.instruction support.function.builtin.migoto"
push = [
  {meta_scope = "meta.statement.instruction.migoto"},
  {
    match = '=',
    scope = "keyword.operator.execution.migoto",
    push = [
      {include = "callable-commandlist"},
      # TODO: forbid `,` in this
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

## Preset Condition Statement
[[contexts.preset-body]]
match = '(?i)\b(condition)\b'
scope = "meta.keyword.key keyword.other.condition.migoto"
push = [
  {meta_scope = "meta.statement.condition.migoto"},
  {
    match = '=',
    scope = "keyword.operator.assignment.migoto",
    push = [
      {include = "operational-expr"},
      # TODO: forbid `,` in this
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

## Preset Assignment Statement
[[contexts.preset-body]]
match = '(?i)(?=\b[xyzw]\d{0,3}\b)'
push = [
  {meta_scope = "meta.statement.assignment.migoto"},
  {include = "ini-parameter"},
  {
    match = '=',
    scope = "keyword.operator.assignment.migoto",
    push = [
      {include = "static-value"},
      # TODO: forbid `,` in this
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

[[contexts.preset-body]]
match = '(?i)(?=\$(\\.+\\)?\w+\b)'
push = [
  {meta_scope = "meta.statement.assignment.migoto"},
  {include = "named-variable"},
  {
    match = '=',
    scope = "keyword.operator.assignment.migoto",
    push = [
      {include = "static-value"},
      # TODO: forbid `,` in this
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

## Preset Setting Statement
[[contexts.preset-body]]
match = '(?i)\b({{ident}})\b'
scope = "meta.keyword.key keyword.other.migoto"
push = [
  {meta_scope = "meta.statement.setting.migoto"},
  {
    match = '=',
    scope = "punctuation.separator.key-value.migoto",
    push = [
      {include = "fixed-value"},
      {include = "boolean-value"},
      {include = "static-value"},
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

[[contexts.preset-body]]
include = "fallthrough"

# Regex Sections

## Shader Regex Pattern and Replace bodies defined with their headers above

## Shader Regex (Insert Declarations)
[[contexts.regex-declarations-body]]
include = "comment"  # everything not a comment is free_text until source.dxbc is made

[[contexts.regex-declarations-body]]
include = "fallthrough"

## Shader Regex (CommandList)
[[contexts.regex-commandlist-body]]
include = "comment"

[[contexts.regex-commandlist-body]]
include = "shader-regex-setting-statement"

[[contexts.regex-commandlist-body]]
include = "primary-statement"

[[contexts.regex-commandlist-body]]
include = "fallthrough"

[[contexts.shader-regex-setting-statement]]
match = '(?i)\b(filter_index)\b'
scope = "meta.keyword.key keyword.other.migoto"
push = [
  {meta_scope = "meta.statement.setting.migoto"},
  {
    match = '=',
    scope = "punctuation.separator.key-value.migoto",
    push = [
      {include = "constant"},
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

[[contexts.shader-regex-setting-statement]]
match = '(?i)\b(shader_model|temps)\b'
scope = "meta.keyword.key keyword.other.migoto"
push = [
  {meta_scope = "meta.statement.setting.migoto"},
  {
    match = '=',
    scope = "punctuation.separator.key-value.migoto",
    push = [
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

# Normal Bodies

[[contexts.kvp-body]]
include = "comment"

[[contexts.kvp-body]]
include = "setting-statement"

[[contexts.kvp-body]]
include = "fallthrough"

[[contexts.cl-body]]
include = "comment"

[[contexts.cl-body]]
include = "setting-statement"

[[contexts.cl-body]]
include = "primary-statement"

[[contexts.cl-body]]
include = "fallthrough"

# Body Contents

# Setting Statements

## Hash Statement
[[contexts.setting-statement]]
match = '''(?xi)
^{{ws}}*
(?=
  \bhash\b
  \s* = \s*
  [a-z0-9]+
)
'''
push = [
  {meta_scope = "meta.statement.setting.migoto"},
  {match = '(?i)\b(hash)\b', scope = "meta.keyword.hash.key keyword.other.migoto"},
  {
    match = '=',
    scope = "punctuation.separator.key-value.migoto",
    push = [
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

## Custom Shader Name Keys
[[contexts.setting-statement]]
match = '''(?xi)
^{{ws}}*
(?=
  \b[vhdgpc]s\b
  \s* = \s*
  [^\r\n]+
)
'''
push = [
  {meta_scope = "meta.statement.setting.migoto"},
  {match = '(?i)\b([vhdgpc]s)\b', scope = "meta.keyword.shader.key keyword.other.migoto"},
  {
    match = '=',
    scope = "punctuation.separator.key-value.migoto",
    push = [
      {match = '(?i)\b(null)\b', scope = "constant.language.null.migoto"},
      {include = "path-value"},
      {match = '{{line_end_context}}', pop = true},
    ],
  },
  {match = '{{line_end_context}}', pop = true},
]

## Keybinding Keys
[[contexts.setting-statement]]
match = '''(?xi)
^{{ws}}*
(?=
  \b({{keybinding_keys}})\b
  \s* = \s*
  [^\r\n]+
)
'''
push = [
  {meta_scope = "meta.statement.setting.migoto"},
  {match = '(?i)\b{{keybinding_keys}}', scope = "meta.keyword.binding.key keyword.other.migoto"},
  {
    match = '=',
    scope = "punctuation.separator.key-value.migoto",
    push = [
      {include = "keybinding-modifier"},
      {match = '{{line_end_context}}', pop = true},
    ],
  },
  {match = '{{line_end_context}}', pop = true},
]

## Directory and File Keys
[[contexts.setting-statement]]
match = '''(?xi)
^{{ws}}*
(?=
  \b({{path_keys}})\b
  \s* = \s*
  [^\r\n]+
)
'''
push = [
  {meta_scope = "meta.statement.setting.migoto"},
  {match = '(?i)\b{{path_keys}}', scope = "meta.keyword.path-value.key keyword.other.migoto"},
  {
    match = '=',
    scope = "punctuation.separator.key-value.migoto",
    push = [
      {include = "path-value"},
      {match = '(.+?){{ws}}*$', captures.1 = "constant.other.path.migoto"},
      {match = '{{line_end_context}}', pop = true},
    ],
  },
  {match = '{{line_end_context}}', pop = true},
]

[[contexts.setting-statement]]
match = '''(?xi)
^{{ws}}*
(?!\b(?:
  hash|[vhdgpc]s|
  {{path_keys}}|{{keybinding_keys}}|
  run|checktextureoverride|(?:exclude_)?preset|handling|clear|special|dump|store|
  draw(?:indexed|instanced|indexedinstanced|instancedindirect|indexedinstancedindirect)?|dispatch(?:indirect)?|
  vb\d|ib|(?:[rf]_)?bb|s?o\d|od|
  (?<!$)[xyzw]\d{0,3}|
  this|(?:ini|stereo)params|cursor_(?:mask|color)|
  Resource.+
)\b)
(?=
  [\w\[\]]+   # a word-like that is not in the preceding list and includes brackets for blend[N]/blend_factor[N] keys
  \s* = \s*   # kvp separator surrounded by optional whitespace
  (?: [^"\\/\s\r\n]+ | [^\s\r\n]+ | [^\r\n]+ )    # match anything on the right-hand-side
)
'''
push = [
  {meta_scope = "meta.statement.setting.migoto"},
  {include = "key"},  # If a Key is found, match and continue searching in this context
  # once the separator is found, only allow certain values on the right
  {
    match = '=',
    scope = "punctuation.separator.key-value.migoto",
    push = [
      {
        match = '(?i)(?=[^"\\/\s\r\n]+)',
        push = [
          {include = "resource-type"},  # DXGI types + Resource types
          {include = "constant"},
          {include = "boolean-value"},
          {include = "path-value"},
          {include = "fixed-value"},
          {match = '{{line_end_context}}', pop = true},
        ]
      },
      {
        match = '(?i)(?=[^\s\r\n]+)',
        push = [
          {include = "string"},
          {include = "path-value"},
          {include = "fixed-value"},
          {match = '{{line_end_context}}', pop = true},
        ]
      },
      {
        match = '(?i)(?=[^\r\n]+)',
        push = [
          {include = "string"},
          {include = "path-value"},
          {include = "dxgi-format"},
          {include = "constant"},
          {include = "blend-expr"},
          {include = "marking-action-opt"},
          {include = "frame-analysis-opt"},
          {include = "fuzzy-match-expr"},
          {include = "fixed-value"},
          {match = '{{line_end_context}}', pop = true},
        ]
      },
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

# Command List Statements

## Primary Statement
[[contexts.primary-statement]]
include = "local-declaration"

[[contexts.primary-statement]]
include = "general-statement"

[[contexts.primary-statement]]
include = "conditional-statement"

## Conditional Statement
[[contexts.conditional-statement]]
match = '(?i)^{{ws}}*(if|elif|else if)(?= )'
captures.1 = "keyword.control.flow.migoto"
push = [
  {meta_scope = "meta.statement.conditional.migoto"},
  {meta_content_scope = "meta.expression.operational.migoto"},
  {include = "operational-expr"},
  {match = '{{line_end_context}}', pop = true},
]

[[contexts.conditional-statement]]
match = '(?i)^{{ws}}*(else|endif){{ws}}*$'
captures.1 = "keyword.control.flow.migoto"
push = [
  {meta_scope = "meta.statement.conditional.migoto"},
  {match = '{{line_end_context}}', pop = true},
]

## Global Declaration
[[contexts.global-declaration]]
match = '''(?xi)
(?=
  (?:\b persist \s+)?
  \b global \s+
  (?:\b persist \s+)?
\s*
  (?:
    = \s*
    (?:[+\-]?[\d.]+|inf|NaN) # RHS value, only Numbers allowed
  )? # Assignment operator and RHS-value are optional
)'''
push = [
  {meta_scope = "meta.statement.declaration.global.migoto"},
  {match = '(?i)\b(global|persist)\b', scope = "storage.modifier.migoto"},
  {include = "named-variable"},
  {
    match = '=',
    scope = "keyword.operator.assignment.migoto",
    push = [
      {include = "static-value"},
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

## Local Declaration
[[contexts.local-declaration]]
match = '''(?xi)
(?=
  \b local \s+
  \$\w+ \b
\s*
  (?:
    = \s*
    [^\r\n]+
  )?
)'''
push = [
  {meta_scope = "meta.statement.declaration.local.migoto"},
  {match = '(?i)\b(local)\b', scope = "storage.modifier.migoto"},
  {include = "named-variable"},
  {
    match = '=',
    scope = "keyword.operator.assignment.migoto",
    push = [
      {include = "operational-expr"},
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

## General Statement
[[contexts.general-statement]]
include = "assignment-statement"

[[contexts.general-statement]]
include = "instruction-statement"

## Assignment Statement
[[contexts.assignment-statement]]
match = '''(?xi)
^{{ws}}*
(?=
  (?: (?:pre|post) \s+)? # pre and post modifiers, optional
  (?: \$ (?:\\.+\\)? \w+ | \b[xyzw]\d{0,3}\b ) # a $ variable or an ini parameter
  \s* = \s*
  [^\r\n]+
)'''
push = [
  {meta_scope = "meta.statement.assignment.migoto"},
  {match = '(?i)\b(pre|post)\b', scope = "meta.command-list.priority keyword.control.directive.migoto"},
  {include = "ini-parameter"},
  {include = "named-variable"},
  {
    match = '=',
    scope = "keyword.operator.assignment.migoto",
    push = [
      {include = "operational-expr"},
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

[[contexts.assignment-statement]]
match = '''(?xi)
^{{ws}}*
(?=
  (?: (?:pre|post) \s+)? # pre and post modifiers, optional
  \b(
    [vgdhpcsturfibo\-\d_]+\b |
    this\b | (?:ini|stereo)params\b | cursor_(?:mask|color)\b |
    Resource\S+
  )   # a limited resource operand
  \s* = \s*
  [^\r\n]+
)'''
push = [
  {meta_scope = "meta.statement.assignment.migoto"},
  {match = '(?i)\b(pre|post)\b', scope = "meta.command-list.priority keyword.control.directive.migoto"},
  {include = "resource"},
  {
    match = '=',
    scope = "keyword.operator.assignment.migoto",
    push = [
      {include = "resource-usage-expr"},
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

## Instruction Statement
[[contexts.instruction-statement]]
match = '''(?xi)
{{ws}}*
(?=
  (?:
    (?: (?:pre|post) \s+)? # pre and post modifiers, optional
    \b\w+\b  # an instruction
    \s* = \s*
    [^\r\n]+ # RHS value, depends on type of instruction
  ) |
  drawauto
)'''

[[contexts.instruction-statement.push]]
meta_scope = "meta.statement.instruction.migoto"

[[contexts.instruction-statement.push]]
match = '(?i)\b(pre|post)\b'
scope = "meta.command-list.priority keyword.control.directive.migoto"

[[contexts.instruction-statement.push]]
match = '(?xi)(?= \b checktextureoverride \b \s* = \s* [^\r\n]+)'
push = [
  {meta_scope = "meta.checktextureoverride"},
  {match = '(?i)\b(checktextureoverride)\b', scope = "meta.function-call.instruction support.function.builtin.migoto"},
  {
    match = '=',
    scope = "keyword.operator.execution.migoto",
    push = [
      {include = "resource"},
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

[[contexts.instruction-statement.push]]
match = '(?xi)(?= \b run \b \s* = \s* [^\r\n]+)'
push = [
  {meta_scope = "meta.run-instruction"},
  {match = '(?i)\b(run)\b', scope = "meta.function-call.instruction support.function.builtin.migoto"},
  {
    match = '=',
    scope = "keyword.operator.execution.migoto",
    push = [
      {include = "callable-commandlist"},
      {include = "callable-customshader"},
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

[[contexts.instruction-statement.push]]
match = '(?xi)(?= \b (?:exclude_)?preset \b \s* = \s* [^\r\n]+)'
push = [
  {meta_scope = "meta.preset-instruction"},
  {match = '(?i)\b((?:exclude_)?preset)\b', scope = "meta.function-call.instruction support.function.builtin.migoto"},
  {
    match = '=',
    scope = "keyword.operator.execution.migoto",
    push = [
      {
        match = '(?xi)(?= (?:Preset)? (?:\\.+\\)? [^=$,\r\n]+ )',
        push = [
          {meta_scope = "meta.function-call variable.other.function.migoto"},
          {match = '(?i)\b(Preset)', scope = "entity.name.function.section-type.migoto"},
          {match = '(?=\\)', push = [{include = "namespace"}]},
          {include = "section-identifier"},
          {match = '{{line_end_context}}', pop = true},
        ]
      },
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

[[contexts.instruction-statement.push]]
match = '(?xi)(?= \b handling \b \s* = \s* [^\r\n]+)'
push = [
  {meta_scope = "meta.handling-instruction"},
  {match = '(?i)\b(handling)\b', scope = "meta.function-call.instruction support.function.builtin.migoto"},
  {match = '=', scope = "keyword.operator.execution.migoto"},
  {include = "fixed-value"},
  {match = '{{line_end_context}}', pop = true},
]

[[contexts.instruction-statement.push]]
match = '(?xi)(?= \b reset_per_frame_limits \b \s* = \s* [^\r\n]+)'
push = [
  {meta_scope = "meta.reset-limits"},
  {
    match = '(?i)\b(reset_per_frame_limits)\b',
    scope = "meta.function-call.instruction support.function.builtin.migoto"
  },
  {
    match = '=',
    scope = "keyword.operator.execution.migoto",
    push = [
      {include = "custom-resource"},
      {include = "callable-customshader"},
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

[[contexts.instruction-statement.push]]
match = '(?xi)(?= \b clear \b \s* = \s* [^\r\n]+)'
push = [
  {meta_scope = "meta.clear-instruction"},
  {match = '(?i)\b(clear)\b', scope = "meta.function-call.instruction support.function.builtin.migoto"},
  {
    match = '=',
    scope = "keyword.operator.execution.migoto",
    push = [
      {include = "resource"},
      {include = "shader-identifier"},
      {match = '(?i)\b0x[a-f0-9]+\b', scope = "constant.numeric.migoto"},
      {include = "static-value"},
      {include = "fixed-value"},
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

[[contexts.instruction-statement.push]]
match = '(?xi)(?= \b (?:separation|convergence) \b \s* = \s* [^ \t\r\n]+)'
push = [
  {meta_scope = "meta.stereo-instruction"},
  {
    match = '(?i)\b(separation|convergence)\b',
    scope = "meta.function-call.instruction support.function.builtin.migoto"
  },
  {
    match = '=',
    scope = "keyword.operator.execution.migoto",
    push = [
      {include = "static-value"},
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

[[contexts.instruction-statement.push]]
match = '(?xi)(?= \b direct_mode_eye \b \s* = \s* [^\r\n]+)'
push = [
  {meta_scope = "meta.dme-instruction"},
  {match = '(?i)\b(direct_mode_eye)\b', scope = "meta.function-call.instruction support.function.builtin.migoto"},
  {match = '=', scope = "keyword.operator.execution.migoto"},
  {include = "fixed-value"},
  {match = '{{line_end_context}}', pop = true},
]

[[contexts.instruction-statement.push]]
match = '(?xi)(?= \b analyse_options \b \s* = \s* [^\r\n]+)'
push = [
  {meta_scope = "meta.analysis-instruction"},
  {match = '(?i)\b(analyse_options)\b', scope = "meta.function-call.instruction support.function.builtin.migoto"},
  {
    match = '=',
    scope = "keyword.operator.execution.migoto",
    push = [
      {include = "frame-analysis-opt"},
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

[[contexts.instruction-statement.push]]
match = '(?xi)(?= \b dump \b \s* = \s* [^\r\n]+)'
push = [
  {meta_scope = "meta.dump-instruction"},
  {match = '(?i)\b(dump)\b', scope = "meta.function-call.instruction support.function.builtin.migoto"},
  {
    match = '=',
    scope = "keyword.operator.execution.migoto",
    push = [
      {include = "resource"},
      {include = "shader-identifier"},
      {include = "frame-analysis-opt"},
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

[[contexts.instruction-statement.push]]
match = '(?xi)(?= \b special \b \s* = \s* [^\r\n]+)'
push = [
  {meta_scope = "meta.special-instruction"},
  {match = '(?i)\b(special)\b', scope = "meta.function-call.instruction support.function.builtin.migoto"},
  {match = '=', scope = "keyword.operator.execution.migoto"},
  {include = "fixed-value"},
  {match = '{{line_end_context}}', pop = true},
]

[[contexts.instruction-statement.push]]
match = '''(?xi)
(?=
  \b store \b
  \s* = \s*
  (?:(\$[^,\r\n]+)\s*,\s*([^,\r\n]+)\s*,\s*(\d+))
)'''
push = [
  {meta_scope = "meta.store-instruction"},
  {match = '(?i)\b(store)\b', scope = "meta.function-call.instruction support.function.builtin.migoto"},
  {
    match = '=',
    scope = "keyword.operator.execution.migoto",
    push = [
      {include = "named-variable"},
      {include = "resource-usage-expr"},
      {match = '\d+', scope = "constant.numeric.migoto"},
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

[[contexts.instruction-statement.push]]
match = '''(?xi)
{{ws}}*
(?=
  \b (draw (indexed|instanced|indexedinstanced)? | dispatch) \b
  \s* = \s*
  [^\r\n]+
)
'''
push = [
  {meta_scope = "meta.draw-instruction"},
  {
    match = '(?i)\b(draw(indexed|instanced|indexedinstanced)?|dispatch)\b',
    scope = "meta.function-call.instruction support.function.builtin.migoto"
  },
  {
    match = '=',
    scope = "keyword.operator.execution.migoto",
    push = [
      {include = "operational-expr"},
      {include = "fixed-value"},
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

[[contexts.instruction-statement.push]]
match = '''(?xi)
{{ws}}*
(?=
  \b (?:drawinstanced|drawindexedinstanced|dispatch)indirect \b
  \s* = \s*
  [^\r\n]+\s*,\s*\d+
)
'''
push = [
  {meta_scope = "meta.draw-indirect-instruction"},
  {
    match = '(?i)\b((?:drawinstanced|drawindexedinstanced|dispatch)indirect)\b',
    scope = "meta.function-call.instruction support.function.builtin.migoto"
  },
  {
    match = '=',
    scope = "keyword.operator.execution.migoto",
    push = [
      {include = "resource"},
      {include = "shader-identifier"},
      {match = '\d+', scope = "constant.numeric.migoto"},
      {match = '{{line_end_context}}', pop = true},
    ]
  },
  {match = '{{line_end_context}}', pop = true},
]

[[contexts.instruction-statement.push]]
match = '(?i){{ws}}*\b(drawauto)\b'
scope = "meta.drawauto-instruction"
captures.1 = "meta.function-call.instruction support.function.builtin.migoto"

[[contexts.instruction-statement.push]]
match = '{{line_end_context}}'
pop = true

# Expressions

## Blend Expression
[[contexts.blend-expr]]
match = '''(?xi)
(?= \b (?: (\w+) \s+ (\w+) \s+ (\w+) | disable) )
'''
push = [
  {meta_scope = "meta.expression.blend-state.migoto"},
  {
    match = '(?i)\b(add|(?:rev_)?subtract|min|max|disable)\b',
    scope = "meta.keyword.blend-operator keyword.operator.migoto"
  },
  {
    match = '\b(?i)(zero|one|(?:inv_)?(?:src1?|dest)_(?:color|alpha)|src_alpha_sat|(?:inv_)?blend_factor)\b',
    scope = "meta.keyword.blend-factor keyword.other.migoto"
  },
  {match = '{{line_end_context}}', pop = true},
]

## Fuzzy Match Expression
[[contexts.fuzzy-match-expr]]
scope = "meta.expression.fuzzy-match.migoto"
match = '''(?xi)
([><]=?|[!=])? # optional operator
\s*
(?:
  \b (\d+) \b | # number (int)
  (?:
    \b ((?:res_)?(?:width|height)|depth|array) \b # field name
    \s*
    (?:
      (?:(\*)\s*\b((?:res_)?(?:width|height)|depth|array)\b) |
      (?:(\*)\s*\b(\d+)\b)? # integer multiplicand
      \s*
      (?:(/)\s*\b(\d+)\b)? # integer divisor
    )
  ) # field expression
)
\s*$
'''
captures.1 = "keyword.operator.comparison.migoto"
captures.2 = "constant.numeric.migoto"
captures.3 = "meta.match-field constant.language.migoto"
captures.4 = "keyword.operator.math.migoto"
captures.5 = "meta.match-field constant.language.migoto"
captures.6 = "keyword.operator.math.migoto"
captures.7 = "constant.numeric.migoto"
captures.8 = "keyword.operator.math.migoto"
captures.9 = "constant.numeric.migoto"

## Resource Usage Expression
[[contexts.resource-usage-expr]]
meta_scope = "meta.expression.resource-usage.migoto"

[[contexts.resource-usage-expr]]
include = "resource-usage-modifier"

[[contexts.resource-usage-expr]]
include = "resource"

[[contexts.resource-usage-modifier]]
match = '(?i)\b(copy(?:_desc(?:ription)?)?|ref(?:erence)?|raw|stereo|mono|stereo2mono|set_viewport|no_view_cache|resolve_msaa|unless_null)\b'
scope = "meta.keyword.resource-usage-modifier keyword.other.functional.migoto"

## Operational Expression
[[contexts.operational-expr]]
meta_scope = "meta.expression.operational.migoto"

[[contexts.operational-expr]]
include = "illegal-operator"

[[contexts.operational-expr]]
include = "operator"

[[contexts.operational-expr]]
include = "operand"

[[contexts.operational-expr]]
include = "round-braces"

### Operators, legal and illegal

[[contexts.illegal-operator]]
scope = "invalid.illegal.operator.migoto"
match = '(?xi) -{2,} | \+{2,} | \*{3,} | /{3,} | %{2,} | [><]={2,} | ! ={3,} | ={4,} | [!><]{2,} | &{3,} | \|{3,} | \^+ '

[[contexts.operator]]
match = '''(?xi)
(?:
  ( \*\* | \* | \+ | - | % | // | / ) |       # arithmetic operators
  ( !== | != | === | == | >= | <= | > | < ) | # comparison operators
  ( ! | && | \|\| )                           # logical operators
)'''
captures.1 = "keyword.operator.math.migoto"
captures.2 = "keyword.operator.comparison.migoto"
captures.3 = "keyword.operator.logical.migoto"

[[contexts.round-braces]]
match = '\('
captures.0 = "punctuation.parenthesis.begin.migoto"
push = [
  {meta_content_scope = "meta.expression.operational.nested.migoto"},
  {include = "operational-expr"},
  {
    match = '\)',
    captures.0 = "punctuation.parenthesis.end.migoto",
    pop = true,
  },
]

### Resource operands

[[contexts.resource]]
# Includes ConstantBufferSlot, VertexBufferSlot, IndexBuffer, and BackBuffers
scope = "variable.language.buffer.migoto"
match = '\b(?i)(?:[vhdgpc]s-cb\d{1,2}|vb\d|ib|(?:[rf]_)?bb)\b'

[[contexts.resource]]
# TextureSlot, UAVSlot, Render targets
scope = "variable.language.shader-slot.migoto"
match = '\b(?i)([pc]s-u\d|s?o\d|od|[vhdgpc]s(?:-t\d{1,3}))\b'

[[contexts.resource]]
scope = "variable.language.resource-identifier.migoto"
match = '\b(?i)(this|null|(?:ini|stereo)params|cursor_(?:mask|color))\b'

[[contexts.resource]]
include = "custom-resource"

### Normal operands

[[contexts.operand]]
include = "constant"

[[contexts.operand]]
include = "named-variable"

[[contexts.operand]]
include = "ini-parameter"

# resource must come before shader-identifier
[[contexts.operand]]
include = "resource"

[[contexts.operand]]
include = "shader-identifier"

[[contexts.operand]]
# Numbered Scissor Rectangle. The non-numbered ones corresponding to 0 are in override parameters
scope = "constant.language.scissor-rectangle.migoto"
match = '\b(?i)(scissor\d+_(?:left|top|right|bottom))\b'

[[contexts.operand]]
# constant instead of variable scope name because their use is more like language constants
scope = "constant.language.override-parameter.migoto"
match = '''(?xi)
\b(
  (?:rt|res|window)_(?:width|height) | (?:vertex|index|instance)_count | first_(?:vertex|index|instance) |
  thread_group_count_[xyz] | indirect_offset | draw_type | cursor_(?: showing | (?:screen_|window_|hotspot_)?[xy] ) |
  time | hunting | sli | frame_analysis | effective_dpi | (?:raw_|eye_)?separation | convergence |
  stereo_(?:active|available) | scissor_(?:left|top|right|bottom)
)\b'''

[[contexts.static-override-parameter]]
scope = "constant.language.override-parameter.migoto"
match = '(?i)\b(sli|hunting|frame_analysis|stereo_(?:active|available))'

[[contexts.shader-identifier]]
scope = "variable.language.shader-identifier.migoto"
match = '(?i)\b[vhdgpc]s\b'

[[contexts.named-variable]]
match = '''(?xi) (?= \$ (?:\\{{namespace}}\\)? (?:{{var}}) \b )'''
push = [
  {meta_scope = "meta.variable.named"},
  {match = '\$', scope = "punctuation.definition.variable.migoto"},
  {match = '(?=\\)', push = [{include = "namespace"}]},
  {match = '(?i)({{var}})', scope = "variable.other.readwrite.migoto"},
  {match = '\b', pop = true},
]

[[contexts.callable-commandlist]]
match = '''(?xi)
(?=
  (?:BuiltIn)?CommandList
  (?:\\{{namespace}}\\)?
  {{custom_section_name}}
  \b (?!\\)
)'''
push = [
  {meta_scope = "meta.function-call.commands"},
  {match = '(?i)\b(?:BuiltIn)?CommandList', scope = "entity.name.function.section-type.migoto"},
  {match = '(?=\\)', push = [{include = "namespace"}]},
  {include = "section-identifier"},
  {match = '(?=[=$,\r\n])', pop = true},
]

[[contexts.callable-customshader]]
match = '''(?xi)
(?=
  (?:BuiltIn)?CustomShader
  (?:\\{{namespace}}\\)?
  {{custom_section_name}}
  \b (?!\\)
)'''
push = [
  {meta_content_scope = "meta.function-call.shader"},
  {match = '(?i)\b(?:BuiltIn)?CustomShader', scope = "entity.name.function.section-type.migoto"},
  {match = '(?=\\)', push = [{include = "namespace"}]},
  {include = "section-identifier"},
  {match = '(?=[=$,\r\n])', pop = true},
]

[[contexts.custom-resource]]
match = '''(?xi)
(?=
  Resource
  (?:\\{{namespace}}\\)?
  [^\/&!>|<= $,\r\n]+
  \b (?!\\)
)'''
push = [
  {meta_content_scope = "meta.variable.custom-resource"},
  {match = '(?i)\bResource', scope = "variable.other.readwrite.migoto"},
  {match = '(?=\\)', push = [{include = "namespace"}]},
  {match = '[^\/&!>|<= $,\r\n]+', scope = "entity.name.function.migoto"},
  {match = '(?=[/&!>|<\s=$,])', pop = true},
]

[[contexts.namespace]]
match = '\\'
scope = "punctuation.separator.namespace.migoto"
push = [
  {meta_scope = "meta.name.namespace-resolution"},
  {meta_content_scope = "entity.name.namespace.migoto"},
  {match = '[^=$\r\n]+(?=\\)', push = [{match = '\\', scope = "punctuation.separator.namespace.migoto", pop = 3}]},
]

[[contexts.section-identifier]]
scope = "entity.name.function.migoto"
match = '{{custom_section_name}}'

[[contexts.ini-parameter]]
scope = "variable.parameter.migoto"
match = '(?i)\b(?:(?<!$)[xyzw]\d{0,3})\b'

[[contexts.keybinding-modifier]]
scope = "meta.keyword.key-binding constant.language.modifier-key.migoto"
match = '(?i)\b(?:(?:no_)?(?:vk_)?(?:ctrl|control|alt|shift|windows)|no_modifiers)\b'

[[contexts.marking-action-opt]]
scope = "meta.fixed-value.marking-action variable.other.enummember.migoto"
match = '(?i)\b(clipboard|hlsl|asm|regex|mono_snapshot|stereo_snapshot|snapshot_if_pink)\b'

[[contexts.frame-analysis-opt]]
scope = "meta.fixed-value.analysis-option variable.other.enummember.migoto"
match = '''(?xi)
\b
(hold|stereo|mono|
 dump_(?:rt|depth|tex|[cvi]b)|jp(?:s|e?g)|(?:jp(?:s|e?g)_)?dds|buf|txt|desc|clear_rt|persist|
 filename_(?:reg|handle)|log|dump_on_(?:unmap|update)|deferred_ctx_(?:immediate|accurate)|
 share_dupes|symlink|dump_(?:rt|depth|tex)_(?:jps|dds)|dump_[cvi]b_txt)
\b'''

[[contexts.constant]]
scope = "constant.language.numeric.migoto"
match = '(?i)\b(?:inf|NaN)\b'

[[contexts.constant]]
scope = "constant.numeric.migoto"
match = '[-+]?\b(?:\d+(?:\.\d+)?|\.\d+)\b'

[[contexts.boolean-value]]
scope = "constant.language.boolean.migoto"
match = '(?i)\b(?:true|false|yes|no|on|off)\b'

[[contexts.static-value]]
include = "static-override-parameter"

[[contexts.static-value]]
include = "constant"

[[contexts.fixed-value]]
scope = "meta.fixed-value variable.other.enummember.migoto"
match = '(?i)\b({{ident}})\b'

[[contexts.path-value]]
scope = "constant.other.path.migoto"
match = '''(?i)(?=.*[\\/])(?:(?:(?:[a-z]:|\.[.]?)[\\/])?(?![\s\\/]+)(?:\.\.|\b[^>\\|/<?:*$]+)(?:(?:\\|/)(?:\.\.|[^>\\|/<?:*$\r\n]+))+)'''

[[contexts.path-value]]
scope = "constant.other.file.migoto"
match = '''(?i)\b[^>\\|/<?:*$]+(?!\s+)\.(?=[a-z0-9]*[a-z]+)[a-z0-9]+'''

[[contexts.string]]
match = '"'
push = [
  {meta_scope = "string.quoted.double.migoto"},
  {match = '"', pop = true},
]

[[contexts.key]]
scope = "meta.fixed-value.key keyword.other.migoto"
match = '(?i)\b(?:[a-z0-9]\w+(?:\[(\d+)\])?)'
captures.1 = "constant.numeric.migoto"

